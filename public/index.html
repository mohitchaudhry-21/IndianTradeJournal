<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptionsDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <script>
    // Handle GitHub Pages SPA redirect
    (function() {
      var redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        if (redirect !== '/') {
          window.history.replaceState(null, null, redirect);
        }
      }
    })();
  </script>
  <style>
    /* ── Global font rendering fixes ── */
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "kern" 1, "liga" 1;
    }

    /* All elements inherit smoothing */
    *, *::before, *::after {
      -webkit-font-smoothing: inherit;
      -moz-osx-font-smoothing: inherit;
    }

    /* JetBrains Mono — tabular nums for crisp number alignment */
    @font-face {
      font-family: 'JetBrains Mono';
      font-display: swap;
    }

    /* Any element using mono font gets tabular number rendering */
    [style*="JetBrains"], [style*="font-mono"], [style*="monospace"] {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1, "kern" 1;
      -webkit-font-smoothing: antialiased;
    }

    /* Force pixel-perfect rendering — no subpixel shifts */
    #root {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* CSS variable override — ensure font-mono is set */
    :root {
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: 'Sora', 'Nunito Sans', system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
